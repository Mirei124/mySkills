interface:
  display_name: "Research Hypothesis Loop"
  short_description: "Persistent arXiv-backed research hypothesis loop"
  default_prompt: "Use $research-hypothesis-loop to investigate arXiv evidence, maintain research state, compare hypotheses, and use project code as session-only method context when requested."
dependencies:
  tools:
    - type: "mcp"
      value: "arxiv_mcp_server"
      description: "Search, inspect, download, and read the arXiv evidence used by the research loop."
policy:
  allow_implicit_invocation: true
